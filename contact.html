<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>YourWear | Contact</title>
  <link rel="stylesheet" href="style.css" />
<link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
</head>
<body>

 <header class="header">
  <div class="container header-inner">

    <!-- LOGO -->
    <a class="brand" href="index.html">
      <img src="images/LOGO.png" alt="YourWear logo">
      <strong>YourWear</strong>
    </a>

   <div class="search-wrap">

<input 
type="text" 
id="searchInput" 
placeholder="Search (products, delivery, about...)"
autocomplete="off"
>

<button onclick="runSearch()">Search</button>

<div class="search-results" id="searchResults"></div>

</div>

    <!-- NAVIGATION -->
    <nav class="nav">
      <a href="index.html">Home</a>
      <a href="shop.html">Shop</a>
      <a href="about.html">About us</a>
      <a href="legal.html">Legal</a>
      <a href="contact.html">Contact us</a>
    </nav>

  </div>
</header>

  <section class="section">
    <div class="container">
      <div class="kicker">CONTACT</div>
      <h1 class="h1" style="font-size: clamp(26px,3vw,40px);">Reach us</h1>

      <div class="contact-grid">
        <div class="card">
          <h3>Social media</h3>
          <p><strong>Instagram:</strong> @yourwearbrand</p>
          <p><strong>TikTok:</strong> @yourwearbrand</p>
          <p><strong>Email:</strong> yourwear10@email.com</p>
          <p><strong>Phone:</strong> +212 7 73685871</p>

          <div style="margin-top:12px;">
            <a class="btn primary" href="shop.html">Start a request</a>
          </div>
        </div>

        <div class="qr">
          <h3 style="margin:0 0 10px;">Or Scan QR</h3>
          <img src="images/qr code.png" alt="YourWear QR code">
          <p style="color:var(--muted); margin:10px 0 0; line-height:1.6;">
            <strong></strong> 
          </p>
        </div>
      </div>
    </div>
  </section>

  <footer class="footer">
    <div class="container">© YourWear — Contact</div>
  </footer>

  <!-- CHATBOT -->
  <button id="chatToggle" class="chat-toggle" aria-label="Open chat">💬</button>
  <div id="chatWidget" class="chat-widget" aria-hidden="true">
    <div class="chat-header">
      
      <div>
        <strong>YourWear Assistant</strong>
        <div class="sub">24/7</div>
      </div>
      <button id="chatClose" class="chat-close" aria-label="Close chat">✕</button>
    </div>
    <div id="chatBox" class="chat-box" aria-live="polite"></div>
    <div id="quickReplies" class="quick-replies"></div>
    <form id="chatForm" class="chat-form" autocomplete="off">
      <input id="chatInput" type="text" placeholder="Type your message..." />
      <button type="submit">Send</button>
    </form>
  </div>

  <script src="script.js"></script>
</body>
</html>
